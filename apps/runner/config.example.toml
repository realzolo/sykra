# Runner config (TOML). Environment variables override these values.

[runner]
port = "8200"
token = ""
concurrency = 4
queue = "analysis"
analyze_timeout = "900s"
data_dir = "data"

[database]
url = "postgres://user:pass@localhost:5432/spec_axis"

[redis]
url = "redis://localhost:6379/0"

[pipeline]
queue = "pipelines"
concurrency = 4
run_timeout = "2h"
log_retention_days = 30
artifact_retention_days = 30
require_worker = true

[worker]
lease_ttl = "45s"

[security]
encryption_key = ""

[studio]
# Base URL for Studio (used by pipeline source_checkout and review_gate job types)
url = "http://localhost:8109"
# Optional: token presented to Studio as `X-Runner-Token`. If empty, Runner will
# fall back to the main `RUNNER_TOKEN` env var / `[runner].token` value.
token = ""
