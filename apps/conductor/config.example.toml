# Conductor config (TOML). Environment variables override these values.
# Keep only bootstrap infrastructure values here.
# Product runtime policies are configured from Studio Settings > Runtime.

[conductor]
port = "8200"
token = ""
data_dir = "data" # optional local state path

[database]
url = "postgres://user:pass@localhost:5432/sykra"

[pipeline]
concurrency = 4
run_concurrency = 1

[security]
encryption_key = ""

[studio]
# Base URL for Studio (used for Conductor -> Studio callbacks/events)
url = "http://localhost:8109"
# Optional: token presented to Studio as `X-Conductor-Token`. If empty, Conductor will
# fall back to the main `CONDUCTOR_TOKEN` env var / `[conductor].token` value.
token = ""
