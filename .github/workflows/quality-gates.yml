name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  studio-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint and policy tests
        run: pnpm lint

      - name: Build Studio
        run: pnpm build
